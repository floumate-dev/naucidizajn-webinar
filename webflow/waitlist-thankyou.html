<!-- Sakrij/ukloni iClosed Lift Widget SAMO na ovoj stranici -->
<style>
  iframe[src*="iclosed.io"],
  [id*="iclosed" i],
  [class*="iclosed" i],
  [data-cta-widget] { display: none !important; }
</style>
<script>
(function () {
  function nuke() {
    document.querySelectorAll('iframe[src*="iclosed.io"], [id*="iclosed" i], [class*="iclosed" i], [data-cta-widget]').forEach(function (el) { el.remove(); });
  }
  nuke();
  var obs = new MutationObserver(nuke);
  try { obs.observe(document.documentElement, { childList: true, subtree: true }); } catch (e) {}
  setTimeout(function () { obs.disconnect(); }, 20000);
})();
</script>

<style>

.wl-ty-inner h1{ margin:26px 0 0; font-weight:500; font-size:clamp(30px,5vw,44px); line-height:1.1; letter-spacing:-0.02em; color:var(--white); text-wrap:balance; }

</style>
